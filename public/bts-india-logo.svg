<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="flag-grad" x1="0" y1="60" x2="0" y2="452" gradientUnits="userSpaceOnUse">
        <stop offset="0%" stop-color="#FF9933" />
        <stop offset="33.33%" stop-color="#FF9933" />
        <stop offset="33.33%" stop-color="#FFFFFF" />
        <stop offset="66.66%" stop-color="#FFFFFF" />
        <stop offset="66.66%" stop-color="#138808" />
        <stop offset="100%" stop-color="#138808" />
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="6" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g filter="url(#soft-glow)">
    <!-- BTS Logo (Top) -->
    <polygon points="116,90 236,60 236,240 116,210" fill="url(#flag-grad)" />
    <polygon points="276,60 396,90 396,210 276,240" fill="url(#flag-grad)" />
    
    <!-- ARMY Logo (Bottom) -->
    <polygon points="116,272 236,302 236,422 116,452" fill="url(#flag-grad)" />
    <polygon points="276,302 396,272 396,452 276,422" fill="url(#flag-grad)" />
    
    <!-- Ashoka Chakra (Center) -->
    <g transform="translate(256, 256)">
        <!-- White base for the Chakra -->
        <circle cx="0" cy="0" r="35" fill="#FFFFFF" />
        
        <!-- Outer Rim -->
        <circle cx="0" cy="0" r="33" fill="none" stroke="#000080" stroke-width="2" />
        
        <!-- Center Dot -->
        <circle cx="0" cy="0" r="3.5" fill="#000080" />
        
        <!-- 24 Spokes -->
        <g stroke="#000080" stroke-width="1.2">
            <line x1="0" y1="0" x2="0" y2="-33" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(15)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(30)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(45)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(60)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(75)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(90)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(105)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(120)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(135)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(150)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(165)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(180)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(195)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(210)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(225)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(240)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(255)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(270)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(285)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(300)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(315)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(330)" />
            <line x1="0" y1="0" x2="0" y2="-33" transform="rotate(345)" />
        </g>
    </g>
  </g>
  
  <!-- Text Label -->
  <text x="256" y="495" font-family="'Inter', 'Montserrat', 'Helvetica', sans-serif" font-weight="900" font-size="24" fill="#FFFFFF" text-anchor="middle" letter-spacing="8" filter="url(#soft-glow)">INDIA FOR BTS</text>
</svg>
